worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30s;
    keepalive_requests 1000;

    proxy_cache_path /var/cache/nginx/redirect
        levels=1:2
        keys_zone=redirect_cache:100m
        max_size=1g
        inactive=10m
        use_temp_path=off;

    upstream redirect_server {
        server host.docker.internal:8081;
        keepalive 128;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Cache-Status $upstream_cache_status always;

        location /actuator/ {
            proxy_pass http://redirect_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache off;
        }

        location / {
            proxy_pass http://redirect_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache redirect_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme|$request_method|$host|$uri";
            proxy_cache_valid 301 302 30s;
            proxy_cache_valid 404 410 10s;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_lock_age 5s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;

            proxy_connect_timeout 1s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
