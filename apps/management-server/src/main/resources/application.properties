spring.application.name=short-url-management-server
server.port=8080
server.tomcat.connection-timeout=2s
server.tomcat.keep-alive-timeout=5s
server.tomcat.max-keep-alive-requests=100
server.tomcat.max-swallow-size=64KB
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=1000
server.tomcat.max-connections=8192

short-url.public-base-url=http://localhost:8081
short-url.cache.redis.enabled=true
short-url.cache.local.maximum-size=100000
short-url.cache.stampede.lock-ttl=3s
short-url.cache.stampede.wait-timeout=500ms
short-url.cache.stampede.poll-interval=20ms
short-url.cache.redirect.default-ttl=10m
short-url.cache.redirect.negative-ttl=30s
short-url.cache.redirect.gone-ttl=1m
short-url.cache.redirect.ttl-jitter-ratio=0.1
short-url.management.create.max-request-body-bytes=8192
short-url.management.create.max-drain-body-bytes=0

spring.datasource.url=jdbc:postgresql://localhost:5432/short_url
spring.datasource.username=short_url
spring.datasource.password=short_url
spring.datasource.hikari.connection-timeout=500
spring.datasource.hikari.validation-timeout=500
short-url.datasource.replication.enabled=${SHORT_URL_DB_REPLICATION_ENABLED:true}
short-url.datasource.replication.replica.url=${SHORT_URL_DB_REPLICA_URL:jdbc:postgresql://localhost:5433/short_url}
short-url.datasource.replication.replica.username=${SHORT_URL_DB_REPLICA_USERNAME:short_url}
short-url.datasource.replication.replica.password=${SHORT_URL_DB_REPLICA_PASSWORD:short_url}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=100ms
short-url.cache.redis.replication.enabled=${SHORT_URL_REDIS_REPLICATION_ENABLED:true}
short-url.cache.redis.replication.master.host=${SHORT_URL_REDIS_MASTER_HOST:localhost}
short-url.cache.redis.replication.master.port=${SHORT_URL_REDIS_MASTER_PORT:6379}
short-url.cache.redis.replication.replicas[0].host=${SHORT_URL_REDIS_REPLICA_1_HOST:localhost}
short-url.cache.redis.replication.replicas[0].port=${SHORT_URL_REDIS_REPLICA_1_PORT:6380}
short-url.cache.redis.replication.replicas[1].host=${SHORT_URL_REDIS_REPLICA_2_HOST:localhost}
short-url.cache.redis.replication.replicas[1].port=${SHORT_URL_REDIS_REPLICA_2_PORT:6381}
spring.transaction.default-timeout=2s

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

short-url.access-log.enabled=true
short-url.access-log.path=${SHORT_URL_ACCESS_LOG_PATH:../../logs/short-url-management-server/api-access.log}
short-url.access-log.include-query-string=true
short-url.access-log.flush-every-lines=${SHORT_URL_ACCESS_LOG_FLUSH_EVERY_LINES:256}
short-url.access-log.async-enabled=${SHORT_URL_ACCESS_LOG_ASYNC_ENABLED:true}
short-url.access-log.queue-capacity=${SHORT_URL_ACCESS_LOG_QUEUE_CAPACITY:65536}
