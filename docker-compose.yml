services:
  postgres:
    image: postgres:17-alpine
    container_name: short-url-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: short_url
      POSTGRES_USER: short_url
      POSTGRES_PASSWORD: short_url
    volumes:
      - short-url-postgres-data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U short_url -d short_url"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-replication-setup:
    image: postgres:17-alpine
    container_name: short-url-postgres-replication-setup
    environment:
      PGPASSWORD: short_url
    volumes:
      - ./postgres/setup-replication.sh:/setup-replication.sh:ro
    command:
      - "sh"
      - "/setup-replication.sh"
    depends_on:
      postgres:
        condition: service_healthy

  postgres-replica:
    image: postgres:17-alpine
    container_name: short-url-postgres-replica
    ports:
      - "5433:5432"
    environment:
      PGDATA: /var/lib/postgresql/data
    volumes:
      - short-url-postgres-replica-data:/var/lib/postgresql/data
    command:
      - "sh"
      - "-c"
      - |
        if [ ! -s "$$PGDATA/PG_VERSION" ]; then
          rm -rf "$$PGDATA"/*
          until pg_isready -h postgres -p 5432 -U short_url -d short_url; do
            sleep 1
          done
          pg_basebackup -d "host=postgres port=5432 user=replicator password=replicator dbname=short_url" -D "$$PGDATA" -Fp -Xs -P -R
        fi
        exec docker-entrypoint.sh postgres
    depends_on:
      postgres-replication-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U short_url -d short_url"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: short-url-valkey
    ports:
      - "6379:6379"
    command:
      - "valkey-server"
      - "--appendonly"
      - "yes"
    volumes:
      - short-url-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  valkey-replica-1:
    image: valkey/valkey:8-alpine
    container_name: short-url-valkey-replica-1
    ports:
      - "6380:6379"
    command:
      - "valkey-server"
      - "--replicaof"
      - "valkey"
      - "6379"
      - "--appendonly"
      - "yes"
    volumes:
      - short-url-valkey-replica-1-data:/data
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  valkey-replica-2:
    image: valkey/valkey:8-alpine
    container_name: short-url-valkey-replica-2
    ports:
      - "6381:6379"
    command:
      - "valkey-server"
      - "--replicaof"
      - "valkey"
      - "6379"
      - "--appendonly"
      - "yes"
    volumes:
      - short-url-valkey-replica-2-data:/data
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx-cache:
    image: nginx:1.27-alpine
    container_name: short-url-nginx-cache
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - short-url-nginx-cache-data:/var/cache/nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: short-url-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - short-url-prometheus-data:/prometheus

  loki:
    image: grafana/loki:2.9.8
    container_name: short-url-loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - short-url-loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: short-url-promtail
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/short-url:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.1
    container_name: short-url-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - short-url-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  k6:
    image: grafana/k6:0.49.0
    profiles:
      - load-test
    entrypoint:
      - k6
    environment:
      MANAGEMENT_BASE_URL: http://host.docker.internal:8080
      REDIRECT_BASE_URL: http://host.docker.internal:8081
      VUS: 20
      DURATION: 1m
      SHORT_URL_COUNT: 100
    volumes:
      - ./load-tests/k6:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  short-url-postgres-data:
  short-url-postgres-replica-data:
  short-url-valkey-data:
  short-url-valkey-replica-1-data:
  short-url-valkey-replica-2-data:
  short-url-prometheus-data:
  short-url-loki-data:
  short-url-grafana-data:
  short-url-nginx-cache-data:
